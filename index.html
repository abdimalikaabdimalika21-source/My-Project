<html lang="id">
<head>

<title>Love Hover Text</title>
<style>
    html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
}

    html, body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #1a001f, #000);
        overflow: hidden;
        height: 100%;
        font-family: 'Segoe UI', sans-serif;
    }

    canvas {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none; 
}

    .text {
        position: fixed;
        width: 100%;
        text-align: center;
        top: 8%;
        font-size: 42px;
        color: #ff9ecf;
        text-shadow: 0 0 15px #ff4d9d, 0 0 30px #ff1a75;
        letter-spacing: 3px;
        transition: all 0.6s ease;
        cursor: pointer;
        z-index: 10;
    }

    .text:hover {
        color: #fff;
        text-shadow: 0 0 20px #ff9ecf, 0 0 40px #ff4d9d;
        transform: scale(1.08);
    }
    @media (max-width: 768px) {
    .text {
        top: 6%;
        font-size: 24px;
        letter-spacing: 1px;
        padding: 0 10px;
    }
}
.overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #2a002f, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.login-box {
    background: rgba(20, 0, 25, 0.85);
    padding: 26px 22px 24px;
    border-radius: 22px;
    text-align: center;
    backdrop-filter: blur(14px);
    box-shadow:
        0 0 25px rgba(255, 77, 157, 0.6),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    width: 90%;
    max-width: 320px;
    box-sizing: border-box;
    animation: pop 0.6s ease;
    position: relative;
    z-index: 1001;

}

@keyframes pop {
    0% {
        transform: scale(0.85);
        opacity: 0;
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}


.login-box h2 {
    color: #ff9ecf;
    margin-bottom: 18px;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.login-box input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 18px;
    text-align: center;
    box-sizing: border-box;
}

.login-box input::placeholder {
    color: #999;
}

.login-box button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #ff4d9d, #ff1a75);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
    box-sizing: border-box;
    margin-bottom: 12px;
}
.login-box button:hover {
    transform: scale(1.03);
}

.login-box button:active {
    transform: scale(0.96);
}

.login-box button:active {
    transform: scale(0.96);
}

@media (max-width: 480px) {
    .login-box h2 {
        font-size: 20px;
    }

    .login-box input,
    .login-box button {
        box-sizing: border-box;
    }
    .login-box input:focus {
    box-shadow: 0 0 0 2px rgba(255, 77, 157, 0.35);
    }
}

.respon-text {
    margin-top: 16px;
    font-size: 15px;
    color: #ffd6e8;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
}

.respon-text.show {
    opacity: 1;
    transform: translateY(0);
}

.scene-btn {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #ff4d9d, #ff1a75);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s ease;
}

.scene-btn:active {
    transform: scale(0.96);
    box-shadow: 0 0 18px #ff4d9d;
}

.scene-btn.disabled {
    opacity: 0.5;
    pointer-events: none;
    transform: scale(0.95);
}

.emoji-pop {
    position: absolute;
    font-size: 22px;
    animation: pop 1s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0) translateY(0); opacity: 1; }
    100% { transform: scale(1.6) translateY(-40px); opacity: 0; }
}

.type {
    font-size: 15px;
    color: #ffd6e8;
    margin-top: 14px;
    min-height: 20px;
}

#btnLanjut {
    animation: popBtn 0.5s ease forwards;
}


@keyframes popBtn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.btn-lanjut {
    width: 100%;
    padding: 14px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #ff6fb1, #ff1a75);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    margin-top: 18px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(14px) scale(0.9);
    transition: all 0.45s ease;
    box-shadow: 0 0 0 rgba(255, 77, 157, 0.6);
}

.btn-lanjut.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
    box-shadow: 0 0 18px rgba(255, 77, 157, 0.8);
}

.btn-lanjut:hover {
    transform: scale(1.05);
}

.btn-lanjut:active {
    transform: scale(0.96);
}

/* denyut pelan */
.btn-lanjut.show {
    animation: pulseBtn 1.6s infinite ease-in-out;
}

@keyframes pulseBtn {
    0% { box-shadow: 0 0 14px rgba(255, 77, 157, 0.5); }
    50% { box-shadow: 0 0 26px rgba(255, 77, 157, 0.9); }
    100% { box-shadow: 0 0 14px rgba(255, 77, 157, 0.5); }
}

#btnLanjut {
    z-index: 10000;
    position: relative;
}
.overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
}

.overlay { z-index: 1000; }
.login-box { z-index: 1001; }
.btn-lanjut.show { pointer-events: auto; }

.scene {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
}

.scene.active {
    opacity: 1;
    pointer-events: auto;
}

.text {
    animation: lovePulse 2.5s infinite ease-in-out;
}

@keyframes lovePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

@keyframes ripple {
    from {
        transform: scale(0);
        opacity: 1;
    }
    to {
        transform: scale(6);
        opacity: 0;
    }
}

.final-ui {
    position: fixed;
    bottom: 14%;
    width: 100%;
    text-align: center;
    z-index: 12;
    pointer-events: auto;
}

.final-sub {
    color: #ffd1e8;
    font-size: 15px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 0.8s;
}

.final-btn {
    padding: 12px 26px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #ff6fb1, #ff1a75);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255, 77, 157, 0.7);
    transition: all 0.3s ease;
}

.final-btn:hover {
    transform: scale(1.06);
}

.final-btn:active {
    transform: scale(0.95);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(14px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* HP */
@media (max-width: 768px) {
    .final-sub {
        font-size: 13px;
        padding: 0 16px;
    }
}

/* Efek sparkle (bintang kilauan) */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: radial-gradient(circle, #fff, #ff9ecf);
    border-radius: 50%;
    animation: sparkleFade 2s infinite ease-in-out;
    pointer-events: none;
}

@keyframes sparkleFade {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
}

/* Upgrade animasi teks */
.loveTextUpgrade {
    animation: loveFade 3s infinite ease-in-out, colorShift 4s infinite;
}

@keyframes loveFade {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
}

@keyframes colorShift {
    0% { color: #ff9ecf; }
    50% { color: #ff4d9d; }
    100% { color: #ff9ecf; }
}

/* Tombol kirim pesan */
.sendLoveBtn {
    margin-top: 10px;
    padding: 10px 20px;
    background: linear-gradient(135deg, #ff6fb1, #ff1a75);
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s ease;
}

.sendLoveBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 77, 157, 0.8);
}

</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="login-box">
    <h2>Masukkan Namamu 💕</h2>
    <input type="text" id="nameInput" placeholder="Nama kamu..." />
    <button id="startBtn">Masuk</button>

<!-- SCENE 2 : APA KABAR -->
<div class="overlay" id="sceneApaKabar" style="display:none">
  <div class="login-box">
    <h2 id="sapaNama">Hai 😄</h2>
    <p style="color:#ffd1e6; margin-bottom:18px;">
      Hari ini kamu gimana?

    <button class="scene-btn" onclick="jawab('baik', this)">😆 Baik banget</button>

<canvas id="canvas"></canvas>

<script>
document.getElementById("finalUI").style.display = "none";

const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");
const nameInput = document.getElementById("nameInput");
const loveText = document.getElementById("loveText");

let userName = "";
let flip = false;

// tekan ENTER
nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        masuk();
    }
});

// auto isi nama kalau sudah pernah masuk
window.addEventListener("load", () => {
    const savedName = localStorage.getItem("namaCinta");
    if (savedName) {
        userName = savedName;
        nameInput.value = savedName;
    }
});

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

window.addEventListener("resize", () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

// 🖱️ posisi mouse
const mouse = { x: innerWidth / 2, y: innerHeight / 2 };
window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// posisi touch
window.addEventListener("touchmove", e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
});


// ❤️ fungsi gambar hati
function drawHeart(x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size, size);
    ctx.beginPath();
    for (let i = 0; i <= Math.PI * 2; i += 0.10) {
        const px = 16 * Math.pow(Math.sin(i), 3);
        const py = -(13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
        ctx.lineTo(px, py);
    }
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
}

// 🌧️ hujan hati
const rainHearts = [];
class FallingHeart {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.size = Math.random() * 0.35 + 0.15;
        this.speed = Math.random() * 1.5 + 0.5;
        this.color = `hsl(${330 + Math.random() * 30}, 100%, 70%)`;
    }
    update() {
        this.y += this.speed;
        if (this.y > canvas.height + 20) this.reset();
    }
    draw() { drawHeart(this.x, this.y, this.size, this.color); }
}
for (let i = 0; i < (innerWidth < 768 ? 40 : 70); i++)
    rainHearts.push(new FallingHeart());

// 💕 trail hati mouse
const trail = [];
class MouseHeart {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 0.3 + 0.2;
        this.alpha = 1;
        this.color = `hsl(${330 + Math.random() * 20}, 100%, 65%)`;
    }
    update() {
        this.y -= 0.3;
        this.alpha -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        drawHeart(this.x, this.y, this.size, this.color);
        ctx.globalAlpha = 1;
    }
}

// ❤️ hati utama
let pulse = 0;

function animate() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    rainHearts.forEach(h => { h.update(); h.draw(); });

    const scale = 0.9 + Math.sin(pulse) * 0.08;
    const isMobile = window.innerWidth < 768;
drawHeart(mouse.x, mouse.y, scale * (isMobile ? 4 : 6), "#ff4d9d");


    trail.push(new MouseHeart(mouse.x, mouse.y));
    trail.forEach((h, i) => {
        h.update();
        h.draw();
        if (h.alpha <= 0) trail.splice(i, 1);
    });

    pulse += 0.05;
    requestAnimationFrame(animate);
}

// Variabel untuk sparkle
let sparkles = [];

// Kelas untuk sparkle
class Sparkle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.alpha = Math.random();
        this.speed = Math.random() * 0.5 + 0.1;
    }
    update() {
        this.y += this.speed;
        this.alpha -= 0.01;
        if (this.alpha <= 0 || this.y > canvas.height) {
            this.reset();
        }
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = `hsl(${Math.random() * 60 + 300}, 100%, 80%)`; // Warna pink/random
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = 0;
        this.alpha = 1;
    }
}

// Buat sparkle saat masuk scene akhir
function createSparkles() {
    sparkles = [];
    for (let i = 0; i < 50; i++) { // 50 partikel sparkle
        sparkles.push(new Sparkle());
    }
}

// Update fungsi animate() untuk menambah sparkle
function animate() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    rainHearts.forEach(h => { h.update(); h.draw(); });

    // Tambahan: Gambar sparkle
    sparkles.forEach(s => { s.update(); s.draw(); });

    const scale = 0.9 + Math.sin(pulse) * 0.08;
    const isMobile = window.innerWidth < 768;
    drawHeart(mouse.x, mouse.y, scale * (isMobile ? 4 : 6), "#ff4d9d");

    trail.forEach((h, i) => {
        h.update();
        h.draw();
        if (h.alpha <= 0) trail.splice(i, 1);
    });

    pulse += 0.05;
    requestAnimationFrame(animate);
}

// Upgrade teks dengan class baru
function toggleLoveText() {
    flip = !flip;
    loveText.textContent = flip
        ? `Aku Sayang Kamu, ${userName} 💕`
        : `I Love You, ${userName} 💖`;
    loveText.classList.add("loveTextUpgrade"); // Tambahkan animasi upgrade
}

// Fungsi kirim pesan cinta
function sendLoveMessage() {
    const message = `Hai abdi sayangku cinntaku yang ganteng dan lucuuu banget, aku juga cinta kamu banget! 💖 Kamu bikin hari aku lebih indah. Dari halaman spesial ini 😘`; // Pesan yang dikirim
    const yourNumber = "6287846014672"; // Ganti dengan nomor WhatsApp Anda
    const whatsappUrl = `https://wa.me/${yourNumber}?text=${encodeURIComponent(message)}`; // Kirim langsung ke nomor Anda

    try {
        window.open(whatsappUrl, "_blank"); // Buka WhatsApp langsung
        alert("Pesan sudah siap di WhatsApp kamu! Tinggal klik 'Kirim' ya 💕"); // Instruksi agar terasa otomatis
    } catch (e) {
        alert("Gagal buka WhatsApp. Copy pesan ini dan kirim manual: " + message);
    }
}

    

// Update masukKeLove() untuk panggil createSparkles
function masukKeLove() {
    showScene(null);
    document.getElementById("finalUI").style.display = "block";
    loveText.style.display = "block";
    loveText.textContent = `I Love You, ${userName} 💖`;
    loveText.classList.add("loveTextUpgrade"); // Tambahkan animasi
    if (!animasiJalan) {
        animasiJalan = true;
        animate();
    }
    createSparkles(); // Tambahkan sparkle
    // Jika ada musik/confetti, panggil di sini
}

</script>

<script>
startBtn.addEventListener("click", () => {
    const name = nameInput.value.trim();
    if (!name) {
        alert("Namanya diisi dulu dong 💕");
        return;
    }

    userName = name;
    localStorage.setItem("namaCinta", userName);

    sapaNama.textContent = `Hai ${userName} 😄`;

<script>

    flip = !flip;
    loveText.textContent = flip
        ? `Aku Sayang Kamu, ${userName} 💕`
        : `I Love You, ${userName} 💖`;
}

// laptop
loveText.addEventListener("click", toggleLoveText);

// HP

<script>
function requestFullscreen() {
    const el = document.documentElement;

    if (el.requestFullscreen) {
        el.requestFullscreen();
    } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen(); // Safari
    } else if (el.msRequestFullscreen) {
        el.msRequestFullscreen(); // IE
    }
}

// aktifkan saat user klik tombol masuk
startBtn.addEventListener("click", () => {
    requestFullscreen();
    masuk();
});
</script>

<script>
const sceneApaKabar = document.getElementById("sceneApaKabar");
const sceneBilang = document.getElementById("sceneBilang");
const sapaNama = document.getElementById("sapaNama");

// UBAH ALUR MASUK (LOGIN → SCENE APA KABAR)
function masuk() {
    userName = nameInput.value.trim();

    if (userName === "") {
        alert("Namanya diisi dulu dong 💕");
        return;
    }

    localStorage.setItem("namaCinta", userName);

    overlay.style.display = "none";
    sceneApaKabar.style.display = "flex";
    const btnLanjut = document.getElementById("btnLanjut");
    btnLanjut.classList.remove("show");
    btnLanjut.style.opacity = "0"; // Pastikan opacity 0
    btnLanjut.style.pointerEvents = "none";
    btnLanjut.style.display = "none";

    sapaNama.textContent = `Hai ${userName} 😄`;

    requestFullscreen();
}

// SCENE APA KABAR → SCENE BILANG
function keSceneBilang() {
    sceneApaKabar.style.display = "none";
    sceneBilang.style.display = "flex";

    const text = "Sebenernya aku dari tadi pengen bilang sesuatu ke kamu…";
    const target = document.getElementById("scene3Text");
    const choice = document.getElementById("scene3Choice");

    target.innerHTML = "";
    choice.style.display = "none";

    let i = 0;
    const typing = setInterval(() => {
        target.innerHTML += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(typing);
            setTimeout(() => {
                choice.style.display = "block";
            }, 600);
        }
    }, 40);
}


// SCENE BILANG → LOVE CANVAS
let animasiJalan = false;

function masukKeLove() {
    showScene(null); // SEMUA overlay mati
    document.getElementById("finalUI").style.display = "block";

    loveText.style.display = "block";
    loveText.textContent = `I Love You, ${userName} 💖`;

    if (!animasiJalan) {
        animasiJalan = true;
        animate();
    }
}

</script>

<script>
function jawab(pilihan, tombol) {
    // disable semua tombol
    document
  .querySelectorAll("#sceneApaKabar .scene-btn")
  .forEach(btn => {
      btn.classList.add("disabled");
  });


    // emoji effect
    let emoji = "💖";
    let text = "";

    if (pilihan === "baik") {
        emoji = "✨";
        text = "“Wih baik? Fix hari ini kamu lucu 😆 Coba pap dulu… aku mau cek, ini bahagianya asli atau boongan 😂📸”";
    } 
    if (pilihan === "lumayan") {
        emoji = "😊";
        text = "Lumayan yahh😔... berarti kurang baik dong, coba pap dulu mau liat seberapa kurang baiknya kamu 😁📸";
    }
    if (pilihan === "capek") {
        emoji = "🌙";
        text = "“Capek sedikit? Tenang… itu efek kebanyakan mikirin aku 😆 Pap dong… aku mau jadi alasan kamu senyum, walau cuma 3 detik 😂📸”";
    }

    popEmoji(emoji, tombol);
    typeText(text);

    setTimeout(() => {
        const btn = document.getElementById("btnLanjut");
        btn.classList.add("show"); // Tambahkan class untuk animasi
        btn.style.pointerEvents = "auto";
        btn.style.display = "block"; // Tambahkan ini: Tampilkan tombol sepenuhnya
    }, 5000);
}

function popEmoji(emoji, tombol) {
    const e = document.createElement("div");
    e.className = "emoji-pop";
    e.innerText = emoji;

    const rect = tombol.getBoundingClientRect();
    e.style.left = rect.left + rect.width / 2 + "px";
    e.style.top = rect.top + "px";

    document.body.appendChild(e);
    setTimeout(() => e.remove(), 1000);
}

function typeText(text) {
    const target = document.getElementById("respon");
    target.innerHTML = "";
    let i = 0;

    const interval = setInterval(() => {
        target.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 35);
}

// placeholder (nanti kita sambung ke scene 3)
function lanjutSceneBerikutnya() {
    showScene("sceneBilang");
    mulaiScene3();
}

<script>
let currentScene = "login";

function showScene(id) {
    document.querySelectorAll(".overlay").forEach(s => {
        s.style.display = "none";
        s.style.pointerEvents = "none";
    });

    if (id) {
        const scene = document.getElementById(id);
        scene.style.display = "flex";
        scene.style.pointerEvents = "auto";
    }

    currentScene = id;
}

document.addEventListener("click", e => {
    if (!e.target.classList.contains("scene-btn") &&
        !e.target.classList.contains("btn-lanjut")) return;

    const ripple = document.createElement("span");
    ripple.style.position = "absolute";
    ripple.style.width = "18px";
    ripple.style.height = "18px";
    ripple.style.borderRadius = "50%";
    ripple.style.background = "rgba(255,105,180,0.8)";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    ripple.style.pointerEvents = "none";
    ripple.style.animation = "ripple 0.6s ease-out forwards";

    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
});

function mulaiScene3() {
    const textEl = document.getElementById("scene3Text");
    const choiceEl = document.getElementById("scene3Choice");
    const btnLanjut = document.getElementById("btnScene3Lanjut");

    // reset
    textEl.innerHTML = "";
    choiceEl.style.display = "none";
    btnLanjut.classList.remove("show");

    const text = "Sebenernya aku pengen jujur sama kamu 😳";
    let i = 0;

    const typing = setInterval(() => {
        textEl.innerHTML += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(typing);
            setTimeout(() => {
                choiceEl.style.display = "block";
            }, 500);
        }
    }, 40);
}

function pilihScene3(pilihan) {
    const textEl = document.getElementById("scene3Text");
    const btnLanjut = document.getElementById("btnScene3Lanjut");

    // matikan tombol pilihan (ANTI DOBEL KLIK)
    document.querySelectorAll("#scene3Choice .scene-btn")
      .forEach(btn => {
          btn.disabled = true;
          btn.style.opacity = "0.6";
      });

    const text = pilihan === "penasaran"
        ? "Hehe… kamu bikin aku deg-degan 💕"
        : "Tenang… tapi aku serius sama kamu 🥺";

    textEl.innerHTML = "";
    let i = 0;

    const typing = setInterval(() => {
        textEl.innerHTML += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(typing);
            setTimeout(() => {
                btnLanjut.classList.add("show");
            }, 400);
        }
    }, 35);
}
// Tambahkan event listener untuk tombol pilihan di Scene 3
document.querySelectorAll('#scene3Choice .scene-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const choice = btn.getAttribute('data-choice'); // Ambil nilai dari data-choice
        pilihScene3(choice); // Panggil fungsi pilihScene3 dengan pilihan
    });
});

</script>
