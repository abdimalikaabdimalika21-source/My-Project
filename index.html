<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff1a75">

<!-- iOS fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Love Hover Text</title>
<style>
    html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
}

    html, body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #1a001f, #000);
        overflow: hidden;
        height: 100%;
        font-family: 'Segoe UI', sans-serif;
    }

    canvas {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none; 
}

    .text {
        position: fixed;
        width: 100%;
        text-align: center;
        top: 8%;
        font-size: 42px;
        color: #ff9ecf;
        text-shadow: 0 0 15px #ff4d9d, 0 0 30px #ff1a75;
        letter-spacing: 3px;
        transition: all 0.6s ease;
        cursor: pointer;
        z-index: 10;
    }

    .text:hover {
        color: #fff;
        text-shadow: 0 0 20px #ff9ecf, 0 0 40px #ff4d9d;
        transform: scale(1.08);
    }
    @media (max-width: 768px) {
    .text {
        top: 6%;
        font-size: 24px;
        letter-spacing: 1px;
        padding: 0 10px;
    }
}
.overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #2a002f, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.login-box {
    background: rgba(20, 0, 25, 0.85);
    padding: 26px 22px 24px;
    border-radius: 22px;
    text-align: center;
    backdrop-filter: blur(14px);
    box-shadow:
        0 0 25px rgba(255, 77, 157, 0.6),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    width: 90%;
    max-width: 320px;
    box-sizing: border-box;
    animation: pop 0.6s ease;
}

@keyframes pop {
    0% {
        transform: scale(0.85);
        opacity: 0;
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}


.login-box h2 {
    color: #ff9ecf;
    margin-bottom: 18px;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.login-box input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 18px;
    text-align: center;
    box-sizing: border-box;
}

.login-box input::placeholder {
    color: #999;
}

.login-box button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #ff4d9d, #ff1a75);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
    box-sizing: border-box;
}

.login-box button:active {
    transform: scale(0.96);
}

@media (max-width: 480px) {
    .login-box h2 {
        font-size: 20px;
    }

    .login-box input,
    .login-box button {
        box-sizing: border-box;
    }
    .login-box input:focus {
    box-shadow: 0 0 0 2px rgba(255, 77, 157, 0.35);
    }
}

</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="login-box">
    <h2>Masukkan Namamu 💕</h2>
    <input type="text" id="nameInput" placeholder="Nama kamu..." />
    <button id="startBtn">Masuk</button>
  </div>
</div>

<div class="text" id="loveText">I Love You 💖</div>
<canvas id="canvas"></canvas>

<script>
const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");
const nameInput = document.getElementById("nameInput");
const loveText = document.getElementById("loveText");

let userName = "";
let flip = false;

function masuk() {
    userName = nameInput.value.trim();

    if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("portrait").catch(()=>{});
    }

    if (userName === "") {
        alert("Namanya diisi dulu dong 💕");
        return;
    }

    localStorage.setItem("namaCinta", userName);
    overlay.style.display = "none";
    loveText.textContent = `I Love You, ${userName} 💖`;
}

// klik tombol
startBtn.addEventListener("click", masuk);

// tekan ENTER
nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        masuk();
    }
});

// auto isi nama kalau sudah pernah masuk
window.addEventListener("load", () => {
    const savedName = localStorage.getItem("namaCinta");
    if (savedName) {
        userName = savedName;
        nameInput.value = savedName;
    }
});

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

window.addEventListener("resize", () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

// 🖱️ posisi mouse
const mouse = { x: innerWidth / 2, y: innerHeight / 2 };
window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// posisi touch
window.addEventListener("touchmove", e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
});


// ❤️ fungsi gambar hati
function drawHeart(x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size, size);
    ctx.beginPath();
    for (let i = 0; i <= Math.PI * 2; i += 0.05) {
        const px = 16 * Math.pow(Math.sin(i), 3);
        const py = -(13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
        ctx.lineTo(px, py);
    }
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
}

// 🌧️ hujan hati
const rainHearts = [];
class FallingHeart {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.size = Math.random() * 0.35 + 0.15;
        this.speed = Math.random() * 1.5 + 0.5;
        this.color = `hsl(${330 + Math.random() * 30}, 100%, 70%)`;
    }
    update() {
        this.y += this.speed;
        if (this.y > canvas.height + 20) this.reset();
    }
    draw() { drawHeart(this.x, this.y, this.size, this.color); }
}
for (let i = 0; i < (innerWidth < 768 ? 40 : 70); i++)
    rainHearts.push(new FallingHeart());

// 💕 trail hati mouse
const trail = [];
class MouseHeart {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 0.3 + 0.2;
        this.alpha = 1;
        this.color = `hsl(${330 + Math.random() * 20}, 100%, 65%)`;
    }
    update() {
        this.y -= 0.3;
        this.alpha -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        drawHeart(this.x, this.y, this.size, this.color);
        ctx.globalAlpha = 1;
    }
}

// ❤️ hati utama
let pulse = 0;

function animate() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    rainHearts.forEach(h => { h.update(); h.draw(); });

    const scale = 0.9 + Math.sin(pulse) * 0.08;
    const isMobile = window.innerWidth < 768;
drawHeart(mouse.x, mouse.y, scale * (isMobile ? 4 : 6), "#ff4d9d");


    trail.push(new MouseHeart(mouse.x, mouse.y));
    trail.forEach((h, i) => {
        h.update();
        h.draw();
        if (h.alpha <= 0) trail.splice(i, 1);
    });

    pulse += 0.05;
    requestAnimationFrame(animate);
}

animate();
</script>

<script>
function toggleLoveText() {
    flip = !flip;
    loveText.textContent = flip
        ? `Aku Sayang Kamu, ${userName} 💕`
        : `I Love You, ${userName} 💖`;
}

// laptop
loveText.addEventListener("click", toggleLoveText);

// HP
loveText.addEventListener("touchstart", (e) => {
    e.preventDefault();
    toggleLoveText();
});
</script>

<script>
function requestFullscreen() {
    const el = document.documentElement;

    if (el.requestFullscreen) {
        el.requestFullscreen();
    } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen(); // Safari
    } else if (el.msRequestFullscreen) {
        el.msRequestFullscreen(); // IE
    }
}

// aktifkan saat user klik tombol masuk
startBtn.addEventListener("click", () => {
    requestFullscreen();
    masuk();
});
</script>

</body>
</html>
